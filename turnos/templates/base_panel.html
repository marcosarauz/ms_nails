<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Panel{% endblock %}</title>

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f7d6ec, #efe2ff);
            min-height: 100vh;
        }

        .navbar {
            width: 100%;
            background: white;
            padding: 16px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }

        .brand {
            font-size: 24px;
            font-weight: bold;
            color: #d85caf;
            white-space: nowrap;
        }

        .menu {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .menu a, .menu button {
            background: #d85caf;
            color: white;
            padding: 11px 16px;
            border-radius: 14px;
            text-decoration: none;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        .user-box {
            background: #fff4fb;
            color: #222;
            padding: 10px 14px;
            border-radius: 14px;
            font-weight: bold;
        }

        .salir {
            background: #222 !important;
        }

        .page {
            max-width: 1200px;
            margin: 35px auto;
            padding: 0 20px;
        }

        .contenedor {
            background: white;
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 14px 40px rgba(0,0,0,0.15);
            overflow-x: auto;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                padding: 18px 15px;
                text-align: center;
            }

            .brand {
                font-size: 21px;
                white-space: normal;
            }

            .menu {
                width: 100%;
                justify-content: center;
                gap: 8px;
            }

            .menu a, .menu button, .user-box {
                font-size: 13px;
                padding: 10px 12px;
            }

            .page {
                margin: 20px auto;
                padding: 0 12px;
            }

            .contenedor {
                padding: 22px;
                border-radius: 20px;
            }
        }

        @media (max-width: 480px) {
            .menu {
                flex-direction: column;
            }

            .menu a, .menu button, .menu form, .user-box {
                width: 100%;
            }

            .menu button {
                width: 100%;
            }

            .contenedor {
                padding: 18px;
            }
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

<nav class="navbar">
    <div class="brand">Hola, {{ user.first_name|default:user.username }} 💅</div>

    <div class="menu">
        <a href="/dashboard/">Inicio</a>
        <a href="/agenda/">Agenda</a>
        <a href="/configuracion/">Configuración</a>

        <span class="user-box">👤 {{ user.first_name|default:user.username }}</span>

        <form method="POST" action="/logout/" style="margin:0;">
            {% csrf_token %}
            <button class="salir" type="submit">Salir</button>
        </form>
    </div>
</nav>

<main class="page">
    <section class="contenedor">
        {% block contenido %}{% endblock %}
    </section>
</main>

</body>
</html>
